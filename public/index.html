<!doctype html>
<html lang="id">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Kasir Mini</title>
  <link rel="stylesheet" href="/css/style.css">
  <link rel="manifest" href="/manifest.json">
</head>
<body>
  <main class="container">
    <header class="dashboard-hero" aria-labelledby="warung">
      <div class="dashboard-hero__top">
        <div class="dashboard-hero__identity">
          <h1 class="dashboard-hero__warung" id="warung">Memuat...</h1>
          <p class="dashboard-hero__greeting" id="welcome">Memeriksa admin...</p>
        </div>
        <button class="dashboard-hero__logout" type="button" onclick="window.KasirApp.logout()">Keluar</button>
      </div>

      <div class="dashboard-hero__datetime" id="currentDateTime">Memuat waktu...</div>

      <section class="dashboard-hero__cash" aria-label="Ringkasan sisa kas hari ini">
        <p class="dashboard-hero__cash-label">Sisa kas hari ini</p>
        <p class="dashboard-hero__cash-value" id="statCash">-</p>
        <p class="dashboard-hero__mini-summary">
          Masuk <strong id="statIncome">-</strong> · Keluar <strong id="statExpense">-</strong>
        </p>
      </section>

      <div class="dashboard-hero__footer">
        <span class="connection-status" id="connectionStatus" aria-live="polite">● Online</span>
        <span class="dashboard-hero__kasbon">Kasbon <strong id="statKasbon">-</strong></span>
      </div>
    </header>

    <p class="muted small mb-2" style="margin-top:16px;">Menu Transaksi</p>

    <div class="menu-grid">
      <a href="/pemasukan.html" class="menu-card income">
        <div class="menu-card__icon">📈</div>
        <div class="menu-card__label">Pemasukan</div>
        <div class="menu-card__desc">Catat penjualan</div>
      </a>
      <a href="/pengeluaran.html" class="menu-card expense">
        <div class="menu-card__icon">📉</div>
        <div class="menu-card__label">Pengeluaran</div>
        <div class="menu-card__desc">Catat biaya</div>
      </a>
      <a href="/kasbon.html" class="menu-card kasbon">
        <div class="menu-card__icon">📒</div>
        <div class="menu-card__label">Kasbon</div>
        <div class="menu-card__desc">Hutang pelanggan</div>
      </a>
      <a href="/riwayat.html" class="menu-card">
        <div class="menu-card__icon">📋</div>
        <div class="menu-card__label">Riwayat</div>
        <div class="menu-card__desc">Lihat semua</div>
      </a>
    </div>
  </main>

  <script src="/js/app.js"></script>
  <script>
    (async () => {
      const KasirApp = window.KasirApp;
      KasirApp.renderBottomNav('home');

      const connectionStatus = document.getElementById('connectionStatus');
      function updateConnectionStatus() {
        const online = navigator.onLine;
        connectionStatus.textContent = online ? '● Online' : '● Tidak ada koneksi';
        connectionStatus.classList.toggle('online', online);
        connectionStatus.classList.toggle('offline', !online);
      }
      updateConnectionStatus();
      window.addEventListener('online', updateConnectionStatus);
      window.addEventListener('offline', updateConnectionStatus);

      try {
        const auth = await KasirApp.checkAuth();
        const username = auth.data.username || 'admin';
        document.getElementById('welcome').textContent = `${KasirApp.getGreeting()}, ${username}`;
      } catch (_e) {
        document.getElementById('welcome').textContent = 'Selamat datang';
      }

      try {
        const setting = await KasirApp.getSetting();
        document.getElementById('warung').textContent = setting.data.nama_warung || 'Warung Saya';
      } catch (_e) {
        document.getElementById('warung').textContent = 'Warung Saya';
      }

      function updateDateTime() {
        const now = new Date();
        const dateStr = now.toLocaleDateString('id-ID', {
          weekday: 'long', day: 'numeric', month: 'long', year: 'numeric',
          timeZone: 'Asia/Jakarta'
        });
        const timeStr = now.toLocaleTimeString('id-ID', {
          hour: '2-digit', minute: '2-digit',
          timeZone: 'Asia/Jakarta'
        });
        document.getElementById('currentDateTime').textContent = `${dateStr} · ${timeStr}`;
      }
      updateDateTime();
      setInterval(updateDateTime, 1000);

      try {
        const ringkasan = await KasirApp.apiFetch('/api/ringkasan');
        const data = ringkasan.data || {};
        document.getElementById('statCash').textContent = KasirApp.formatRupiah(data.sisa_kas || 0);
        document.getElementById('statIncome').textContent = KasirApp.formatRupiahShort(data.pemasukan || 0);
        document.getElementById('statExpense').textContent = KasirApp.formatRupiahShort(data.pengeluaran || 0);
        document.getElementById('statKasbon').textContent = KasirApp.formatRupiahShort(data.kasbon_outstanding || 0);
      } catch (_e) {
        document.getElementById('statCash').textContent = '-';
        document.getElementById('statIncome').textContent = '-';
        document.getElementById('statExpense').textContent = '-';
        document.getElementById('statKasbon').textContent = '-';
      }
    })();
  </script>
</body>
</html>
