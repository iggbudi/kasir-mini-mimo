<!doctype html>
<html lang="id">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Kasir Mini</title>
  <link rel="stylesheet" href="/css/style.css">
  <link rel="manifest" href="/manifest.json">
</head>
<body>
  <main class="container">
    <div class="home-header">
      <div class="home-header__top">
        <div>
          <h1 class="home-header__warung" id="warung">Memuat...</h1>
          <p class="home-header__admin" id="welcome"></p>
        </div>
        <div class="home-header__datetime">
          <div class="home-header__date" id="currentDate"></div>
          <div class="home-header__time" id="currentTime"></div>
        </div>
      </div>
    </div>

    <div class="stats-grid" id="statsGrid">
      <div class="stat-card income">
        <div class="stat-card__icon">📈</div>
        <div class="stat-card__label">Masuk</div>
        <div class="stat-card__value" id="statIncome">-</div>
      </div>
      <div class="stat-card expense">
        <div class="stat-card__icon">📉</div>
        <div class="stat-card__label">Keluar</div>
        <div class="stat-card__value" id="statExpense">-</div>
      </div>
      <div class="stat-card kasbon">
        <div class="stat-card__icon">📒</div>
        <div class="stat-card__label">Kasbon</div>
        <div class="stat-card__value" id="statKasbon">-</div>
      </div>
    </div>

    <p class="muted small mb-2" style="margin-top:8px;">Menu Transaksi</p>

    <div class="menu-grid">
      <a href="/pemasukan.html" class="menu-card income">
        <div class="menu-card__icon">📈</div>
        <div class="menu-card__label">Pemasukan</div>
        <div class="menu-card__desc">Catat penjualan</div>
      </a>
      <a href="/pengeluaran.html" class="menu-card expense">
        <div class="menu-card__icon">📉</div>
        <div class="menu-card__label">Pengeluaran</div>
        <div class="menu-card__desc">Catat biaya</div>
      </a>
      <a href="/kasbon.html" class="menu-card kasbon">
        <div class="menu-card__icon">📒</div>
        <div class="menu-card__label">Kasbon</div>
        <div class="menu-card__desc">Hutang pelanggan</div>
      </a>
      <a href="/riwayat.html" class="menu-card">
        <div class="menu-card__icon">📋</div>
        <div class="menu-card__label">Riwayat</div>
        <div class="menu-card__desc">Lihat semua</div>
      </a>
    </div>

    <button class="secondary mt-6" type="button" onclick="window.KasirApp.logout()">Keluar</button>
  </main>

  <script src="/js/app.js"></script>
  <script>
    (async () => {
      const KasirApp = window.KasirApp;
      KasirApp.renderBottomNav('home');

      try {
        const auth = await KasirApp.checkAuth();
        document.getElementById('welcome').textContent = auth.data.username;
      } catch (_e) {}

      try {
        const setting = await KasirApp.getSetting();
        document.getElementById('warung').textContent = setting.data.nama_warung || 'Warung Saya';
      } catch (_e) {}

      function updateDateTime() {
        const now = new Date();
        const dateStr = now.toLocaleDateString('id-ID', {
          weekday: 'long', day: 'numeric', month: 'long', year: 'numeric',
          timeZone: 'Asia/Jakarta'
        });
        const timeStr = now.toLocaleTimeString('id-ID', {
          hour: '2-digit', minute: '2-digit', second: '2-digit',
          timeZone: 'Asia/Jakarta'
        });
        document.getElementById('currentDate').textContent = dateStr;
        document.getElementById('currentTime').textContent = timeStr;
      }
      updateDateTime();
      setInterval(updateDateTime, 1000);

      try {
        const ringkasan = await KasirApp.apiFetch('/api/ringkasan');
        const data = ringkasan.data || {};
        document.getElementById('statIncome').textContent = KasirApp.formatRupiahShort(data.pemasukan || 0);
        document.getElementById('statExpense').textContent = KasirApp.formatRupiahShort(data.pengeluaran || 0);
        document.getElementById('statKasbon').textContent = KasirApp.formatRupiahShort(data.kasbon_outstanding || 0);
      } catch (_e) {
        document.getElementById('statIncome').textContent = '-';
        document.getElementById('statExpense').textContent = '-';
        document.getElementById('statKasbon').textContent = '-';
      }
    })();
  </script>
</body>
</html>
