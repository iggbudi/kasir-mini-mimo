<!doctype html>
<html lang="id">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Riwayat — Kasir Mini</title>
  <link rel="stylesheet" href="/css/style.css">
  <link rel="manifest" href="/manifest.json">
</head>
<body>
  <main class="container">
    <div style="display:flex; justify-content:space-between; align-items:center; margin-bottom:12px;">
      <a href="/" style="text-decoration:none; color:#166534; font-weight:600;">← Beranda</a>
      <span class="muted small" id="warung"></span>
    </div>

    <h1 class="title">Riwayat</h1>

    <section class="card">
      <form id="filterForm" class="filter-bar" style="margin-bottom:12px;">
        <div>
          <label class="small">Dari</label>
          <input type="date" id="dari" required style="min-height:42px;">
        </div>
        <div>
          <label class="small">Sampai</label>
          <input type="date" id="sampai" required style="min-height:42px;">
        </div>
        <div style="align-self:flex-end;">
          <button type="submit" class="primary" style="width:auto; padding:0 16px; min-height:42px;">Filter</button>
        </div>
      </form>

      <div id="list" class="list"></div>
    </section>
  </main>

  <script src="/js/app.js"></script>
  <script src="/js/riwayat.js"></script>
  <script>
    window.KasirApp.renderBottomNav('riwayat');
    window.KasirApp.getSetting?.().then(r => {
      document.getElementById('warung').textContent = r.data.nama_warung || '';
    }).catch(() => {});
  </script>
</body>
</html>
