<!doctype html>
<html lang="id">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Pengeluaran — Kasir Mini</title>
  <link rel="stylesheet" href="/css/style.css">
  <link rel="manifest" href="/manifest.json">
</head>
<body>
  <main class="container">
    <div class="page-header">
      <a href="/" class="back-link">← Beranda</a>
      <span class="muted small" id="warung"></span>
    </div>

    <nav class="nav-links">
      <a href="/pemasukan.html" class="nav-link">Pemasukan</a>
      <a href="/pengeluaran.html" class="nav-link active">Pengeluaran</a>
      <a href="/kasbon.html" class="nav-link">Kasbon</a>
    </nav>

    <h1 class="title">Pengeluaran</h1>

    <section class="card">
      <h3 class="section-title">Tambah Pengeluaran</h3>
      <form id="formPengeluaran">
        <label>Keterangan</label>
        <input id="keterangan" type="text" required placeholder="Contoh: Listrik / Gaji / Bensin">

        <div class="form-row mt-2">
          <div>
            <label>Nominal (Rp)</label>
            <input id="nominal" type="number" min="1" required placeholder="50000">
          </div>
          <div>
            <label>Catatan (opsional)</label>
            <input id="catatan" type="text" placeholder="Opsional">
          </div>
        </div>

        <p class="form-error" id="error"></p>

        <button type="submit" class="primary mt-2" id="btnSubmit">
          <span class="btn-label">Simpan Pengeluaran</span>
          <span class="btn-spinner"></span>
        </button>
      </form>
    </section>

    <section class="card mt-3">
      <div class="summary summary-expense">
        <div class="summary-icon">📉</div>
        <div class="summary-content">
          <div class="summary-label">Total Pengeluaran</div>
          <div class="summary-value" id="total">Rp 0</div>
        </div>
      </div>

      <div class="filter-bar" id="filterBar">
        <button class="btn-filter active" data-filter="today">Hari Ini</button>
        <button class="btn-filter" data-filter="yesterday">Kemarin</button>
        <button class="btn-filter" data-filter="custom">Pilih Tanggal</button>
      </div>
      <div id="customDateRange" class="hidden" style="display:flex;gap:8px;margin-bottom:8px;">
        <input type="date" id="dateDari" class="filter-date-input" style="flex:1;">
        <input type="date" id="dateSampai" class="filter-date-input" style="flex:1;">
        <button class="btn-sm primary" id="btnFilterDate" style="width:auto;min-height:36px;">Filter</button>
      </div>

      <div id="list" class="list"></div>
    </section>
  </main>

  <script src="/js/app.js"></script>
  <script src="/js/pengeluaran.js"></script>
  <script>
    window.KasirApp.renderBottomNav('pengeluaran');
    window.KasirApp.getSetting?.().then(r => {
      document.getElementById('warung').textContent = r.data.nama_warung || '';
    }).catch(() => {});
  </script>
</body>
</html>
